name: Publish in FacephiClienters

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version
        required: true
   

env:
  #Añade el target, el nombre del pod y las arquitecturas que da soporte 
  #(por defecto movil(arm64) y simulador(x86_64 arm64))
  REPOSITORY_CLIENTERS: 'FPHITrackingWidget-SPM'
  USERNAME_ARTIFACTORY: ${{ secrets.USERNAME_ARTIFACTORY }}
  TOKEN_ARTIFACTORY: ${{ secrets.TOKEN_ARTIFACTORY }}

 
permissions:
  contents: read
      

jobs:
  publish_in_Clienters:
    runs-on: cis08
    steps: 
      - uses: actions/checkout@v3
      - name: Set env version
        run: echo "RELEASE_VERSION=${GITHUB_REF#refs/*/}" >> $GITHUB_ENV
     
      - name: Publish XCFramework Facephi-clienters
        uses: ./.github/actions/spm-to-pod-clienters-publish
        with:
          release_version: $RELEASE_VERSION
          github_token: ${{ secrets.GH_TOKEN_FULL }}
          clienters_repository: ${{ env.REPOSITORY_CLIENTERS }}
      
      
        
